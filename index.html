            font-size: 1rem;

<body>
    <div id="app" class="loading">Loading portfolio...</div>

    <div id="experienceModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let portfolioData = {};

        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                portfolioData = await response.json();
                renderPortfolio();
            } catch (error) {
                console.error('Error loading configuration:', error);
                document.getElementById('app').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <h2>Error Loading Portfolio</h2>
                        <p>Please ensure config.json is available.</p>
                    </div>
                `;
            }
        }

        function renderPortfolio() {
            const { profile, experience, education, projects, footer } = portfolioData;
            
            document.title = `${profile.name} - ${profile.title}`;
            
            const appContent = `
                <!-- Hero Section -->
                <section class="hero">
                    <div class="container">
                        <div class="hero-content">
                            <div class="hero-label">
                                ✨ ${profile.availability.text}
                            </div>
                            <h1>Hello, I'm ${profile.name.split(',')[0]}</h1>
                            <div class="hero-subtitle">${profile.title}</div>
                            <p class="hero-description">${profile.summary}</p>
                            <div class="hero-buttons">
                                <a href="mailto:${profile.email}" class="btn btn-primary">
                                    Get In Touch →
                                </a>
                                <a href="${profile.resumePath}" class="btn btn-secondary" download>
                                    Download Resume
                                </a>
                                <a href="${profile.linkedin}" class="btn btn-secondary" target="_blank">
                                    LinkedIn
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="profile-badge">
                        <div class="profile-img">
                            <img src="${profile.profileImage}" alt="${profile.name}">
                        </div>
                        <div class="profile-info">
                            <div class="profile-name">${profile.name.split(',')[0]}</div>
                            <div class="profile-location">${profile.location.split(',')[0]}</div>
                            ${profile.availability.status ? `
                                <div class="availability-badge">
                                    <div class="availability-dot"></div>
                                    Available
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </section>

                <!-- Main Content Section -->
                <section class="main-content">
                    <div class="container">
                        <div class="section-header">
                            <div class="section-label">Professional Portfolio</div>
                            <h2 class="section-title">Experience, Projects & Education</h2>
                            <p class="section-subtitle">A comprehensive view of my professional journey and accomplishments</p>
                        </div>

                        <div class="two-column-grid">
                            <!-- Left Column: Experience -->
                            <div class="left-column">
                                <h3 class="column-title">Work Experience</h3>
                                <div class="experience-timeline">
                                    ${experience.map((job, index) => `
                                        <div class="timeline-item">
                                            <div class="timeline-dot"></div>
                                            <div class="experience-card" onclick="showExperienceDetails('${job.id}')">
                                                <div class="experience-header">
                                                    <div>
                                                        <div class="experience-title">${job.title}</div>
                                                        <div class="experience-company">${job.company}</div>
                                                    </div>
                                                    <div class="experience-duration">${job.years}yr${job.years !== 1 ? 's' : ''}</div>
                                                </div>
                                                <p class="experience-description">${job.description.substring(0, 120)}...</p>
                                                <div class="experience-skills">
                                                    ${job.skills.slice(0, 4).map(skill => `
                                                        <span class="skill-badge">${skill}</span>
                                                    `).join('')}
                                                    ${job.skills.length > 4 ? `<span class="skill-badge">+${job.skills.length - 4}</span>` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Right Column: Projects & Education -->
                            <div class="right-column">

                                <!-- Education -->
                                <div class="right-column-section">
                                    <h3 class="column-title">Education</h3>
                                    ${education.map(edu => `
                                        <div class="education-card">
                                            <div class="education-content">
                                                <div class="education-degree">${edu.degree}</div>
                                                <div class="education-institution">${edu.institution}</div>
                                                <div class="education-year">${edu.year}</div>
                                                <p class="education-details">${edu.details}</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                                <!-- Projects -->
                                <div class="right-column-section">
                                    <h3 class="column-title">Featured Projects</h3>
                                    ${projects.map(project => `
                                        <div class="project-card">
                                            <div class="project-image">
                                                ${getProjectEmoji(project.title)}
                                            </div>
                                            <div class="project-content">
                                                <div class="project-header">
                                                    <h4 class="project-title">${project.title.split(' - ')[0]}</h4>
                                                    <span class="project-status status-${project.status.toLowerCase()}">${project.status}</span>
                                                </div>
                                                <p class="project-description">${project.description.substring(0, 150)}...</p>
                                                <div class="project-tech">
                                                    ${project.technologies.slice(0, 4).map(tech => `
                                                        <span class="tech-tag">${tech}</span>
                                                    `).join('')}
                                                    ${project.technologies.length > 4 ? `<span class="tech-tag">+${project.technologies.length - 4}</span>` : ''}
                                                </div>
                                                <div class="project-footer">
                                                    <div class="project-metrics">${project.metrics}</div>
                                                    <div class="project-links">
                                                        ${Object.entries(project.links).map(([key, url]) => `
                                                            <a href="${url}" class="project-link" title="${key}" target="_blank">
                                                                ${getProjectLinkIcon(key)}
                                                            </a>
                                                        `).join('')}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>

                                
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Footer -->
                <footer class="footer">
                    <div class="container">
                        <div class="footer-content">
                            <h2 class="footer-title">${footer.heading}</h2>
                            <p class="footer-subtitle">${footer.subtext}</p>
                            <div class="hero-buttons" style="justify-content: center;">
                                <a href="mailto:${profile.email}" class="btn btn-primary">
                                    Let's Work Together →
                                </a>
                                <a href="${profile.buyMeCoffee}" class="btn btn-secondary" target="_blank">
                                    Buy Me a Coffee ☕
                                </a>
                            </div>
                        </div>
                        <div class="footer-links">
                            <a href="mailto:${profile.email}" class="footer-link">Email</a>
                            <a href="${profile.linkedin}" class="footer-link" target="_blank">LinkedIn</a>
                            <a href="${profile.resumePath}" class="footer-link" download>Resume</a>
                        </div>
                        <div class="footer-bottom">
                            © ${new Date().getFullYear()} ${profile.name}. Built with passion in ${profile.location.split(',')[0]}.
                        </div>
                    </div>
                </footer>
            `;

            document.getElementById('app').className = '';
            document.getElementById('app').innerHTML = appContent;
        }

        function getProjectEmoji(title) {
            if (title.includes('TeeSheets')) return '⛳';
            if (title.includes('EasyDoesIT')) return '💻';
            if (title.includes('Property')) return '🏠';
            if (title.includes('Crop')) return '🌾';
            return '📊';
        }

        function getProjectLinkIcon(linkType) {
            const icons = {
                'live': '↗',
                'demo': '↗',
                'github': '</>',
                'paper': '📄'
            };
            return icons[linkType] || '🔗';
        }

        function showExperienceDetails(jobId) {
            const job = portfolioData.experience.find(j => j.id === jobId);
            if (!job) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h3 class="modal-title">${job.title}</h3>
                <div class="modal-meta">${job.company} • ${job.location} • ${job.duration}</div>
                <div class="modal-description">${job.description}</div>
                <div style="margin-top: 20px;">
                    <h4 style="margin-bottom: 10px; color: var(--text);">Key Skills</h4>
                    <div class="experience-skills">
                        ${job.skills.map(skill => `<span class="skill-badge">${skill}</span>`).join('')}
                    </div>
                </div>
            `;

            document.getElementById('experienceModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('experienceModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('experienceModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        window.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
